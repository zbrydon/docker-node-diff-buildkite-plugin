name: Docker Diff
description: On a Renovate Docker-digest PR, post the Node.js changelogs between the old and new runtime versions into the PR description.
author: https://github.com/zbrydon
requirements:
  - jq
  - git
  - curl
  - tar
configuration:
  properties:
    branches:
      type: [string, array]
      description: Branch allow-list gate. Defaults to "renovate-docker-images".
    syft-version:
      type: string
      description: Pinned Syft release as "<version>@sha256:<digest>", where the digest is the sha256 of that release's checksums.txt. The value must include the @sha256 digest. Defaults to a version+digest baked into the plugin.
    github-token-env:
      type: string
      description: Name of the env var holding the PR-write token. Defaults to "GITHUB_TOKEN".
  additionalProperties: false
